<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>
    <link rel="stylesheet" href="./Css/Style.css">
</head>
<body>
    
<header class="form-header">
    <div class="container container--flex">

    <img
     src="images/Drive.svg"
    alt="imagem de um contato"
     class="form-header__image-perfil">
     

    <h1 class="form-header__titulo">Contact Form</h1>
    <p class="form-header__text" >Insira os dados do contato e clique em cadastrar! </p>

</div>
</header>   

<div class="container">
<form class="form-contact">
<div class="form-contact__linha">
        <div class="form-contact__col-a">
        <label class="form-contact__label" for="nome">Nome</label>
        </div>
    <div class="form-contact__col-b">
        <input class="form-contact__input form-contact__input--metade" type="text" id="nome" name="nome">
        <input class="form-contact__input form-contact__input--metade" type="text" id="sobrenome" name="sobrenome">
     </div>
</div>

<div class="container">
<form class="form-contact">
<div class="form-contact__linha">
        <div class="form-contact__col-a">
        <label class="form-contact__label" for="nome">Email</label>
        </div>
    <div class="form-contact__col-b">
        <input class="form-contact__input form-contact__input--inteiro" type="text" id="nome" name="nome">
       <!-- <input class="form-contact__input form-contact__input--metade" type="text" id="sobrenome" name="sobrenome">-->
     </div>
</div>
</form>
</div>

<footer>
    Todos os direitos reservados 
</footer>
</body>
</html>
