<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simply - Your Cart</title>

    <link rel="stylesheet" href="./CSS/style.css">
</head>

<body>

    <!-- Cabeçalho -->
    <header>
        <div class="layout-grid">
            <img src="./images/material-symbols_menu.png" alt="Imagem do menu">
            <h1>your cart</h1>
            <img src="./images/lets-icons_bag-fill.png" alt="Imagem do menu">
        </div>
    </header>

    <!-- Conteúdo do carrinho -->
    <div class="phone">

        <div class="header">
            <h2>Your Cart</h2>
        </div>

        <div class="cart-item">
            <img src="https://cdn-icons-png.flaticon.com/512/924/924514.png" alt="Coffee">

            <div class="item-info">
                <h3>Espresso</h3>
                <p>Small</p>

                <div class="quantity">
                    <button>-</button>
                    <span>2</span>
                    <button>+</button>
                </div>
            </div>

            <div class="price">
                R$10,00
            </div>
        </div>

        <button class="add-more">+ Add More Items</button>

        <div class="summary">
            <div class="row">
                <span>Subtotal</span>
                <span>R$10,00</span>
            </div>

            <div class="row">
                <span>Tax</span>
                <span>R$2,00</span>
            </div>

            <div class="row total">
                <span>Total</span>
                <span>R$12,00</span>
            </div>
        </div>

        <button class="checkout">Proceed to Checkout</button>

    </div>

</body>

</html>
