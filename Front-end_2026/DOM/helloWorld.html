<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function saudacao(){
        alert(`Titulo: ${document.getElementById('titulo').textContext}`);
    }
    function mouseMoveu(){
        alert ("Mouse se moveu no botao")
    }
    function clicouBaixo(){
        alert ("clicou no mouse")
    }
    function clicouSubiu(){
        alert ("soltou o botao")
    }
    function cliqueduplo(){
        alert ("Voce clicou duplo no botao")
    }

    </script>
</head>
<body>
    <h1 id="titulo">Ola, eu sou o titulo da pagina</h1>
    <button onclick=" saudacao();">Clique aqui</button> <br>
    <button onmousemove="mouseMoveu();">Passe o mouse</button> <br>
    <button onmousemove="clicouBaixo();">Segura o click</button> <br>
    <button onmouseup="clicouSubiu();">solta o botao</button> <br>
    <button ondblclick="cliqueduplo();">clique duas vez</button> <br>
</body>
</html>
